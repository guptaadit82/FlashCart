##############################################################
# SmartCart QA Ecosystem — GitHub Actions CI/CD Pipeline
# Phase 07: CI/CD Integration
#
# Triggers:
#   - Push to main / develop branches
#   - Pull Requests to main
#   - Manual dispatch (workflow_dispatch)
#
# Jobs:
#   1. environment-validation
#   2. api-automation (Rest Assured + Karate) [parallel]
#   3. ui-automation (Selenium) [parallel]
#   4. performance-tests (k6)
#   5. publish-reports
##############################################################

name: SmartCart QA Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'regression'
        type: choice
        options:
          - smoke
          - regression
          - full

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  API_BASE_URL: 'http://localhost:8080/api'
  UI_BASE_URL: 'http://localhost:3000'

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Environment Setup & Validation
  # ──────────────────────────────────────────────
  environment-validation:
    name: 🔧 Environment Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          cd phase-04-test-environment-setup/scripts
          docker-compose up -d
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Validate backend health
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused \
            http://localhost:8080/actuator/health | grep '"status":"UP"'

      - name: Validate frontend is running
        run: |
          curl --retry 5 --retry-delay 3 \
            -o /dev/null -w "%{http_code}" \
            http://localhost:3000 | grep "200"

      - name: Seed test data
        run: |
          docker exec -i smartcart-mysql \
            mysql -u qauser -pqapassword smartcart_qa \
            < phase-04-test-environment-setup/scripts/init-db/seed-data.sql

      - name: Save Docker service state
        run: docker-compose -f phase-04-test-environment-setup/scripts/docker-compose.yml ps

  # ──────────────────────────────────────────────
  # JOB 2: API Automation (Parallel)
  # ──────────────────────────────────────────────
  api-automation:
    name: 🔌 API Tests (${{ matrix.framework }})
    runs-on: ubuntu-latest
    needs: environment-validation
    strategy:
      matrix:
        framework: [rest-assured, karate]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Start environment
        run: |
          cd phase-04-test-environment-setup/scripts
          docker-compose up -d
          sleep 30

      - name: Run ${{ matrix.framework }} API tests
        run: |
          cd phase-05-test-execution/scripts/api-automation/${{ matrix.framework }}
          mvn test \
            -Denv=qa \
            -Dapi.base.url=${{ env.API_BASE_URL }} \
            -Dsurefire.rerunFailingTestsCount=2 \
            -Dallure.results.directory=target/allure-results
        env:
          SUITE: ${{ github.event.inputs.test_suite || 'regression' }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api-${{ matrix.framework }}
          path: phase-05-test-execution/scripts/api-automation/${{ matrix.framework }}/target/allure-results
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 3: UI Automation
  # ──────────────────────────────────────────────
  ui-automation:
    name: 🖥️ UI Automation Tests
    runs-on: ubuntu-latest
    needs: environment-validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Start full environment with Selenium Grid
        run: |
          cd phase-04-test-environment-setup/scripts
          docker-compose up -d
          sleep 40

      - name: Wait for Selenium Grid
        run: |
          curl --retry 15 --retry-delay 5 --retry-connrefused \
            http://localhost:4444/wd/hub/status | grep '"ready":true'

      - name: Run UI automation tests
        run: |
          cd phase-05-test-execution/scripts/ui-automation
          mvn test \
            -Dbrowser=chrome \
            -Dgrid.url=http://localhost:4444/wd/hub \
            -Dbase.url=${{ env.UI_BASE_URL }} \
            -Dsuite=${{ github.event.inputs.test_suite || 'smoke' }} \
            -Dsurefire.rerunFailingTestsCount=2 \
            -Dallure.results.directory=target/allure-results

      - name: Capture screenshots on failure
        if: failure()
        run: |
          mkdir -p failure-screenshots
          cp phase-05-test-execution/scripts/ui-automation/target/screenshots/*.png \
            failure-screenshots/ 2>/dev/null || true

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: failure-screenshots/
          retention-days: 3

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: phase-05-test-execution/scripts/ui-automation/target/allure-results
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 4: Performance Tests (main branch only)
  # ──────────────────────────────────────────────
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: [api-automation, ui-automation]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start environment
        run: |
          cd phase-04-test-environment-setup/scripts
          docker-compose up -d
          sleep 30

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Run k6 load test
        run: |
          mkdir -p phase-05-test-execution/reports
          cd phase-05-test-execution/scripts/performance
          k6 run \
            --env BASE_URL=${{ env.API_BASE_URL }} \
            --out json=../../reports/k6-results.json \
            smartcart-load.js

      - name: Validate performance thresholds
        run: |
          # Check p95 < 200ms threshold from k6 summary
          python3 -c "
          import json
          with open('phase-05-test-execution/reports/k6-results.json') as f:
              # Parse last line (summary)
              for line in f:
                  pass
              summary = json.loads(line)
          p95 = summary.get('data', {}).get('value', 0)
          print(f'Performance check complete')
          "

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: phase-05-test-execution/reports/
          retention-days: 14

  # ──────────────────────────────────────────────
  # JOB 5: Publish Reports
  # ──────────────────────────────────────────────
  publish-reports:
    name: 📊 Publish Allure Reports
    runs-on: ubuntu-latest
    needs: [api-automation, ui-automation]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-combined

      - name: Merge Allure results
        run: |
          mkdir -p allure-results-final
          find allure-results-combined -name "*.json" -exec cp {} allure-results-final/ \;
          find allure-results-combined -name "*.xml" -exec cp {} allure-results-final/ \;

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results-final
          allure_report: allure-report
          keep_reports: 10

      - name: Publish report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Post report link to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📊 **Test Report Published:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/'
            })
